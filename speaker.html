<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>講者控制台 | Speaker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body style="visibility: hidden;">

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-title-group">
                <h1>待回覆問題</h1>
                <p>來自聽眾的即時提問</p>
            </div>
            <div class="action-buttons">
                <a href="index.html" class="btn-outline-primary">
                    ← 回到聽眾頁面
                </a>
                <button onclick="exportToCSV()" class="btn-secondary">
                    匯出 CSV
                </button>
                <button id="syncToggleBtn" onclick="toggleSync()" class="btn-sync">
                    <span id="syncIndicator" class="sync-dot"></span>
                    自動同步：ON
                </button>
                <button onclick="clearAllData()" class="btn-danger">
                    清除所有資料
                </button>
                <button onclick="changePassword()" class="btn-secondary">
                    🔑 更改密碼
                </button>
                <button onclick="location.reload()" class="btn-secondary">
                    重新整理
                </button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="pending" onclick="switchTab('pending')">
                待回覆問題
            </button>
            <button class="tab-btn" data-tab="resolved" onclick="switchTab('resolved')">
                已解決
            </button>
        </div>

        <!-- Question Grid -->
        <div class="questions-grid" id="speakerQuestionsGrid">
            <!-- Questions will be injected here by JS -->
            <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 2rem;">
                載入中...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Special initialization for Speaker Page
        document.addEventListener('DOMContentLoaded', () => {
            verifySpeakerSession();
            renderSpeakerDashboard();
        });
    </script>
</body>

</html>
